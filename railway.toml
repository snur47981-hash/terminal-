[deploy]
startCommand = "/bin/bash -c \"/bin/ttyd -p 7681 -c $USERNAME:$PASSWORD /bin/bash\""
numReplicas = 1

[deploy.resources]
memoryMb = 4096
vcpus = 4

[deploy.build]
builder = "paketo"
buildCommand = "echo 'Building Kali Linux environment...'"

[deploy.healthcheck]
path = "/"
interval = 30
timeout = 10
